<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alexandria - YouTube Traffic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --neon-pink: #f472b6;
            --neon-cyan: #2dd4bf;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color); color: var(--text-primary);
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(244, 114, 182, 0.04) 0%, transparent 50%);
            display: flex; flex-direction: column; align-items: center; /* Центрирование */
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 10px rgba(244, 114, 182, 0.2); border-color: rgba(244, 114, 182, 0.4); }
            50% { box-shadow: 0 0 25px rgba(244, 114, 182, 0.5); border-color: rgba(244, 114, 182, 1); }
        }

        .tab-content { display: none; width: 100%; max-width: 480px; height: 100vh; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .tab-scroll {
            flex: 1; overflow-y: auto; padding: 20px 16px 140px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .page-header { animation: fadeInUp 0.5s ease backwards; text-align: center; margin-bottom: 20px; }
        .page-header h1 {
            font-size: 34px; font-weight: 800; letter-spacing: -1px; margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--neon-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .page-header p { color: var(--text-muted); font-size: 14px; margin: 4px 0; }

        .services-list {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;
        }

        .service-item {
            position: relative; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 15px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            aspect-ratio: 1.2 / 1; opacity: 0; animation: fadeInUp 0.5s ease forwards;
        }

        .service-item:nth-child(1) { animation-delay: 0.1s; }
        .service-item:nth-child(2) { animation-delay: 0.2s; }
        .service-item:nth-child(3) { animation-delay: 0.3s; }
        .service-item:nth-child(4) { animation-delay: 0.4s; }

        .service-item.active {
            background: rgba(244, 114, 182, 0.08);
            animation: breathe 2.5s infinite ease-in-out, fadeInUp 0.5s ease forwards !important;
        }

        .service-emoji { font-size: 28px; margin-bottom: 6px; }
        .service-info .name { font-weight: 700; font-size: 14px; color: #fff; }
        .service-info .price { font-weight: 800; font-size: 16px; color: var(--neon-cyan); margin-top: 2px; display: block; }

        .check-mark { 
            position: absolute; top: 12px; right: 12px; width: 20px; height: 20px; 
            border-radius: 50%; border: 1px solid var(--glass-border); 
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; 
        }
        .service-item.active .check-mark { background: var(--neon-pink); border-color: var(--neon-pink); color: white; transform: rotate(360deg); transition: 0.5s; }

        textarea {
            width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 16px; color: white; font-family: inherit; font-size: 15px;
            resize: none; min-height: 100px; margin-bottom: 16px; animation: fadeInUp 0.5s ease 0.5s backwards;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #0ea5e9 100%);
            color: white; border: none; width: 100%; padding: 18px; border-radius: 20px;
            font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        /* ПРОФИЛЬ - МЕТОДЫ В РЯД */
        .pay-methods-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px;
        }
        .pay-method {
            padding: 12px 5px; border-radius: 16px; background: rgba(255,255,255,0.02);
            border: 2px solid var(--glass-border); cursor: pointer; text-align: center; transition: 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .pay-method.active { border-color: var(--neon-cyan); background: rgba(45, 212, 191, 0.1); box-shadow: 0 0 15px rgba(45, 212, 191, 0.2); }
        .pay-method span { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); }
        .pay-method.active span { color: #fff; }

        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 28px; padding: 24px; margin-bottom: 15px; text-align: center; }
        .user-balance-value { font-size: 46px; font-weight: 900; margin-bottom: 20px; letter-spacing: -1px; }

        /* ИНФО - КРУПНЫЕ ССЫЛКИ */
        .info-link {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--glass); padding: 22px; border-radius: 22px;
            text-decoration: none; color: white; margin-bottom: 12px;
            border: 1px solid var(--glass-border); font-size: 16px; transition: 0.2s;
        }
        .info-link:active { background: rgba(255,255,255,0.1); }

        .nav-bar {
            position: fixed; bottom: 20px; left: 16px; right: 16px; max-width: 448px; margin: 0 auto;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px);
            border-radius: 26px; border: 1px solid rgba(255,255,255,0.08);
            display: grid; grid-template-columns: repeat(3, 1fr); padding: 10px; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 11px; font-weight: 600; gap: 5px; cursor: pointer; }
        .nav-item.active { color: var(--neon-cyan); }
    </style>
</head>
<body>

    <div id="tab-main" class="tab-content active">
      <div class="tab-scroll">
        <div class="page-header">
            <h1>Alexandria</h1>
            <p>Профессиональный трафик</p>
        </div>
        <div class="services-list">
            <div class="service-item active" data-name="Archive" data-price="250">
                <div class="check-mark">✓</div>
                <span class="service-emoji">📦</span>
                <div class="service-info"><span class="name">Архив</span><span class="price">250 ₽</span></div>
            </div>
            <div class="service-item" data-name="SEO" data-price="130">
                <div class="check-mark">✓</div>
                <span class="service-emoji">📈</span>
                <div class="service-info"><span class="name">SEO</span><span class="price">130 ₽</span></div>
            </div>
            <div class="service-item" data-name="Upload" data-price="100">
                <div class="check-mark">✓</div>
                <span class="service-emoji">🚀</span>
                <div class="service-info"><span class="name">Залив</span><span class="price">100 ₽</span></div>
            </div>
            <div class="service-item" data-name="Unique" data-price="100">
                <div class="check-mark">✓</div>
                <span class="service-emoji">✨</span>
                <div class="service-info"><span class="name">Уникал</span><span class="price">100 ₽</span></div>
            </div>
        </div>
        <textarea id="service-desc" placeholder="Ссылка на билд и пароль..."></textarea>
        <button id="btn-pay" class="btn-primary">Оплатить • <span id="current-price">250</span> ₽</button>
        <div id="status-msg" style="text-align:center;font-size:13px;margin-top:12px;min-height:15px;font-weight:600;"></div>
      </div>
    </div>

    <div id="tab-info" class="tab-content">
        <div class="tab-scroll">
            <div class="page-header"><h1>Инфо</h1><p>Помощь и правила</p></div>
            <a href="https://t.me/transferalexandria" class="info-link" onclick="event.preventDefault(); tg.openLink(this.href)"><b>🏛 О проекте</b><span>→</span></a>
            <a href="https://t.me/Alexandria_supp" class="info-link" onclick="event.preventDefault(); tg.openLink(this.href)"><b>💎 Поддержка 24/7</b><span>→</span></a>
            <a href="https://telegra.ph/Polzovatelskoe-soglashenie-08-15-10" class="info-link" onclick="event.preventDefault(); tg.openLink(this.href)"><b>📄 Соглашение</b><span>→</span></a>
            <a href="https://telegra.ph/Politika-konfidencialnosti-08-15-17" class="info-link" onclick="event.preventDefault(); tg.openLink(this.href)"><b>🔒 Приватность</b><span>→</span></a>
        </div>
    </div>

    <div id="tab-profile" class="tab-content">
        <div class="tab-scroll">
            <div class="page-header"><h1>Профиль</h1><p id="user-name">...</p></div>
            <div class="glass-card">
                <div id="user-balance" class="user-balance-value">0 ₽</div>
                
                <div class="pay-methods-row">
                    <div class="pay-method active" data-method="crystal"><span style="font-size:18px;">💎</span><span>Crystal</span></div>
                    <div class="pay-method" data-method="lolz"><span style="font-size:18px;">⚡</span><span>Lolz</span></div>
                    <div class="pay-method" data-method="platega"><span style="font-size:18px;">🏦</span><span>СБП</span></div>
                </div>

                <input type="number" id="topup-amount" placeholder="Сумма (₽)" style="width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--glass-border); border-radius:18px; padding:16px; color:white; text-align:center; font-size:22px; font-weight:800; margin-bottom:16px;">
                
                <div style="display:grid; grid-template-columns:1fr 1.5fr; gap:12px;">
                    <button id="refresh-balance" class="btn-primary" style="background:var(--glass); border:1px solid var(--glass-border); font-size:14px;">🔄 Обновить</button>
                    <button id="topup-balance" class="btn-primary" style="font-size:14px;">➕ Пополнить</button>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" data-tab="main"><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" fill="none" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg><span>Услуги</span></div>
        <div class="nav-item" data-tab="info"><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" fill="none" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg><span>Инфо</span></div>
        <div class="nav-item" data-tab="profile"><svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" fill="none" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Профиль</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://alexalolz.lol';
        let state = { selectedService: { name: 'Archive', price: 250 }, paymentMethod: 'crystal', user: tg.initDataUnsafe?.user || { id: 715300422, first_name: 'Misha' } };

        const HINTS = { 'Archive': 'Ссылка на билд и пароль...', 'SEO': 'Ссылка на YouTube видео...', 'Upload': 'Архив с видео и данными...', 'Unique': 'Файл для уникализации...' };

        function updateHint(n) { document.getElementById('service-desc').placeholder = HINTS[n] || 'Детали ТЗ...'; }
        function setStatus(t, c) { const e = document.getElementById('status-msg'); e.style.color = c || 'var(--neon-cyan)'; e.innerText = t; }

        tg.expand();
        tg.setHeaderColor('#0b0e14');

        document.querySelectorAll('.nav-item').forEach(i => i.onclick = () => {
            const t = i.dataset.tab;
            tg.HapticFeedback.impactOccurred('light');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            i.classList.add('active');
            if (t === 'profile') updateProfileData();
        });

        document.querySelectorAll('.service-item').forEach(i => i.onclick = () => {
            tg.HapticFeedback.selectionChanged();
            document.querySelectorAll('.service-item').forEach(s => s.classList.remove('active'));
            i.classList.add('active');
            state.selectedService = { name: i.dataset.name, price: parseInt(i.dataset.price) };
            document.getElementById('current-price').innerText = state.selectedService.price;
            updateHint(state.selectedService.name);
        });

        document.querySelectorAll('.pay-method').forEach(i => i.onclick = () => {
            tg.HapticFeedback.selectionChanged();
            document.querySelectorAll('.pay-method').forEach(m => m.classList.remove('active'));
            i.classList.add('active');
            state.paymentMethod = i.dataset.method;
        });

        async function updateProfileData() {
            document.getElementById('user-name').innerText = state.user.first_name;
            try {
                const res = await fetch(`${API_BASE}/api/balance?user_id=${state.user.id}`);
                const data = await res.json();
                document.getElementById('user-balance').innerText = `${Math.floor(data.balance).toLocaleString()} ₽`;
            } catch(e) {}
        }

        document.getElementById('topup-balance').onclick = () => {
            const a = document.getElementById('topup-amount').value.trim();
            if (!a || isNaN(a) || a <= 0) return tg.showAlert("Введите сумму!");
            fetch(`${API_BASE}/api/create_topup`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ user_id: state.user.id, amount: parseFloat(a), payment_method: state.paymentMethod }) })
            .then(r => r.json()).then(d => { if(d.pay_url) tg.openLink(d.pay_url); });
        };

        document.getElementById('btn-pay').onclick = async () => {
            const d = document.getElementById('service-desc').value.trim();
            if (!d) return tg.showAlert("Заполните ТЗ!");
            tg.showConfirm(`Списать ${state.selectedService.price}₽?`, async (ok) => {
                if (!ok) return;
                setStatus('⏳ Обработка...');
                try {
                    const res = await fetch(`${API_BASE}/api/create_order`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ user_id: state.user.id, user_name: state.user.first_name, service_name: state.selectedService.name, description: d, price: state.selectedService.price, payment_method: state.paymentMethod }) });
                    const data = await res.json();
                    if (res.ok) { 
                        setStatus('✅ Принято!', '#4ade80'); 
                        tg.showAlert("Заказ успешно создан!"); 
                        document.getElementById('service-desc').value = "";
                        updateProfileData(); 
                    } else if (data.pay_url) { 
                        tg.showPopup({ title: 'Баланс', message: 'Недостаточно средств. Пополнить?', buttons: [{id:'p', type:'default', text:'Да'}, {type:'cancel'}] }, (id) => { if(id==='p') tg.openLink(data.pay_url); }); 
                    }
                } catch(e) { setStatus('❌ Ошибка', '#f87171'); }
            });
        };

        document.getElementById('refresh-balance').onclick = updateProfileData;
        updateProfileData();
    </script>
</body>
</html>
