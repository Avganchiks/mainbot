<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Alexandria - YouTube Traffic</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --neon-pink: #f472b6;
            --neon-cyan: #2dd4bf;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(244, 114, 182, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(45, 212, 191, 0.06) 0%, transparent 40%);
        }

        /* Анимации */
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes neonPulse {
            0%, 100% { box-shadow: 0 0 12px 0px rgba(244, 114, 182, 0.25); border-color: var(--neon-pink); }
            50% { box-shadow: 0 0 22px 4px rgba(244, 114, 182, 0.45); border-color: #ff85c2; }
        }

        .tab-content { display: none; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .tab-scroll {
            position: fixed; top: 0; left: 0; right: 0;
            bottom: calc(82px + env(safe-area-inset-bottom));
            overflow-y: auto; padding: 24px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .page-header h1 {
            font-size: 34px; font-weight: 800; letter-spacing: -1.5px; margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--neon-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .page-header p { color: var(--text-muted); font-size: 15px; margin: 6px 0 24px 0; }

        /* Bento Grid */
        .services-list {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            grid-template-rows: auto auto;
            gap: 12px;
            margin-bottom: 20px;
        }

        .service-item:nth-child(1) { grid-column: 1 / 2; grid-row: 1 / 3; aspect-ratio: auto; }

        .service-item {
            position: relative;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardAppear 0.5s ease-out both;
            cursor: pointer;
        }

        /* Лесенка появления */
        .service-item:nth-child(1) { animation-delay: 0.1s; }
        .service-item:nth-child(2) { animation-delay: 0.2s; }
        .service-item:nth-child(3) { animation-delay: 0.3s; }
        .service-item:nth-child(4) { animation-delay: 0.4s; }

        /* Активное состояние (Розовый Неон) */
        .service-item.active {
            background: rgba(244, 114, 182, 0.05);
            animation: cardAppear 0.5s ease-out both, neonPulse 2s infinite ease-in-out;
            transform: translateY(-2px);
            z-index: 2;
        }

        .service-emoji { font-size: 32px; margin-bottom: 12px; display: block; filter: drop-shadow(0 0 8px rgba(255,255,255,0.1)); }
        .service-info .name { font-weight: 700; font-size: 14px; color: #fff; line-height: 1.3; }
        .service-info .price { font-weight: 800; font-size: 18px; color: var(--neon-cyan); margin-top: 6px; display: block; }
        
        .check-mark {
            position: absolute; top: 14px; right: 14px;
            width: 22px; height: 22px; border-radius: 50%;
            border: 1.5px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; transition: 0.3s;
        }
        .service-item.active .check-mark { background: var(--neon-pink); border-color: var(--neon-pink); color: white; box-shadow: 0 0 10px var(--neon-pink); }

        textarea {
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--glass-border);
            border-radius: 22px; padding: 18px; color: white; font-family: inherit; font-size: 14px;
            resize: none; transition: 0.3s; min-height: 100px; backdrop-filter: blur(10px);
        }
        textarea:focus { border-color: var(--neon-cyan); background: rgba(45, 212, 191, 0.02); }

        .btn-primary {
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #0ea5e9 100%);
            color: white; border: none; width: 100%; padding: 18px; border-radius: 22px;
            font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 15px;
            box-shadow: 0 10px 25px -5px rgba(45, 212, 191, 0.4);
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        /* Навигация */
        .nav-bar {
            position: fixed; bottom: 15px; left: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 26px; border: 1px solid rgba(255,255,255,0.06);
            display: grid; grid-template-columns: repeat(3, 1fr); padding: 8px; z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; font-size: 11px; font-weight: 600; gap: 4px; }
        .nav-item.active { color: var(--neon-cyan); }
        .nav-item svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2.5; }

        /* Профиль и Инфо */
        .glass-card { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 24px; padding: 18px; margin-bottom: 12px; }
        .info-link { display: flex; align-items: center; justify-content: space-between; background: var(--glass); padding: 18px; border-radius: 20px; text-decoration: none; color: white; margin-bottom: 12px; border: 1px solid var(--glass-border); }
        .pay-method { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px; border-radius: 18px; background: rgba(255,255,255,0.02); border: 2px solid var(--glass-border); cursor: pointer; transition: 0.2s; color: var(--text-muted); }
        .pay-method.active { border-color: var(--neon-cyan); color: white; background: rgba(45, 212, 191, 0.05); }
        .topup-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); border-radius: 18px; padding: 14px; color: white; text-align: center; font-size: 18px; font-weight: 700; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="tab-main" class="tab-content active">
      <div class="tab-scroll">
        <div class="page-header">
            <h1>Alexandria</h1>
            <p>Продвижение вашего контента</p>
        </div>
        
        <div class="services-list" id="services-container">
            <div class="service-item active" data-name="Archive" data-price="250">
                <div class="check-mark">✓</div>
                <span class="service-emoji">📦</span>
                <div class="service-info">
                    <span class="name">Архив (Видео + Превью)</span>
                    <span class="price">250 ₽</span>
                </div>
            </div>
            <div class="service-item" data-name="SEO" data-price="130">
                <div class="check-mark">✓</div>
                <span class="service-emoji">📈</span>
                <div class="service-info">
                    <span class="name">SEO Оптимизация</span>
                    <span class="price">130 ₽</span>
                </div>
            </div>
            <div class="service-item" data-name="Upload" data-price="100">
                <div class="check-mark">✓</div>
                <span class="service-emoji">🚀</span>
                <div class="service-info">
                    <span class="name">Залив видео</span>
                    <span class="price">100 ₽</span>
                </div>
            </div>
            <div class="service-item" data-name="Unique" data-price="100">
                <div class="check-mark">✓</div>
                <span class="service-emoji">✨</span>
                <div class="service-info">
                    <span class="name">Уникализация</span>
                    <span class="price">100 ₽</span>
                </div>
            </div>
        </div>

        <textarea id="service-desc" placeholder=""></textarea>
        
        <button id="btn-pay" class="btn-primary">
            Оплатить • <span id="current-price">250</span> ₽
        </button>
        <div id="status-msg" style="text-align:center;font-size:14px;margin-top:12px;min-height:20px;"></div>
      </div>
    </div>

    <div id="tab-info" class="tab-content">
        <div class="tab-scroll">
            <div class="page-header"><h1>Инфо-центр</h1><p>Помощь и контакты</p></div>
            <a href="https://t.me/transferalexandria" class="info-link"><div><b>🏛 О нас</b></div><span>→</span></a>
            <a href="https://t.me/Alexandria_supp" class="info-link"><div><b>💎 Поддержка 24/7</b></div><span>→</span></a>
            <a href="https://telegra.ph/Polzovatelskoe-soglashenie-08-15-10" class="info-link"><div><b>📄 Соглашение</b></div><span>→</span></a>
        </div>
    </div>

    <div id="tab-profile" class="tab-content">
        <div class="tab-scroll">
            <div class="page-header"><h1>Профиль</h1><p id="user-name">Загрузка...</p></div>
            <div class="glass-card">
                <div style="color:var(--text-muted); font-size:11px; text-transform:uppercase; letter-spacing:1px;">ID: <span id="user-id">0</span></div>
                <div id="user-balance" style="font-size:36px; font-weight:800; margin:8px 0;">0 ₽</div>
                
                <div style="margin-top:20px;">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                        <div class="pay-method active" data-method="crystal"><span>💎 Crystal</span></div>
                        <div class="pay-method" data-method="lolz"><span>⚡ Lolz</span></div>
                    </div>
                    <input type="number" id="topup-amount" class="topup-input" placeholder="Сумма (₽)">
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <button id="refresh-balance" class="btn-primary" style="background:var(--glass); box-shadow:none; font-size:14px;">🔄 Обновить</button>
                        <button id="topup-balance" class="btn-primary" style="margin-top:0; font-size:14px;">➕ Пополнить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" data-tab="main">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            <span>Услуги</span>
        </div>
        <div class="nav-item" data-tab="info">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
            <span>Инфо</span>
        </div>
        <div class="nav-item" data-tab="profile">
            <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Профиль</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const API_BASE = 'https://alexalolz.lol';

        let state = {
            selectedService: { name: 'Archive', price: 250 },
            paymentMethod: 'crystal',
            user: tg.initDataUnsafe?.user || { id: 715300422, first_name: 'Alex' }
        };

        const SERVICE_HINTS = {
            'Archive': 'Обязательно отправьте тут ссылку на ваш билд и пароль...',
            'SEO':     'Обязательно отправляйте ссылку на ваше ютуб видео...',
            'Upload':  'Создайте архив с видео и txt данными канала...',
            'Unique':  'Отправьте ссылку на файл для уникализации...'
        };

        function updateHint(name) {
            document.getElementById('service-desc').placeholder = SERVICE_HINTS[name] || 'Укажите детали ТЗ...';
        }

        function setStatus(text, color) {
            const el = document.getElementById('status-msg');
            el.style.color = color || 'var(--neon-cyan)';
            el.innerText = text;
        }

        updateHint('Archive');
        tg.expand();
        tg.setHeaderColor('#0b0e14');

        // Навигация
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const tabId = item.getAttribute('data-tab');
                tg.HapticFeedback.impactOccurred('light');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById(`tab-${tabId}`).classList.add('active');
                item.classList.add('active');
                if (tabId === 'profile') updateProfileData();
            });
        });

        // Выбор услуги
        document.querySelectorAll('.service-item').forEach(item => {
            item.addEventListener('click', () => {
                tg.HapticFeedback.selectionChanged();
                document.querySelectorAll('.service-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                state.selectedService = {
                    name: item.getAttribute('data-name'),
                    price: parseInt(item.getAttribute('data-price'))
                };
                document.getElementById('current-price').innerText = state.selectedService.price;
                updateHint(state.selectedService.name);
            });
        });

        // Метод оплаты
        document.querySelectorAll('.pay-method').forEach(item => {
            item.addEventListener('click', () => {
                tg.HapticFeedback.selectionChanged();
                document.querySelectorAll('.pay-method').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                state.paymentMethod = item.getAttribute('data-method');
            });
        });

        async function updateProfileData() {
            document.getElementById('user-name').innerText = state.user.first_name;
            document.getElementById('user-id').innerText = state.user.id;
            try {
                const res = await fetch(`${API_BASE}/api/balance?user_id=${state.user.id}`);
                const data = await res.json();
                document.getElementById('user-balance').innerText = `${Math.floor(data.balance).toLocaleString()} ₽`;
            } catch(e) { console.error(e); }
        }

        // Пополнение
        document.getElementById('topup-balance').onclick = () => {
            tg.HapticFeedback.impactOccurred('medium');
            const amount = document.getElementById('topup-amount').value.trim();
            if (!amount || isNaN(amount) || Number(amount) <= 0) return tg.showAlert("Введите сумму!");
            
            fetch(`${API_BASE}/api/create_topup`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: state.user.id,
                    amount: parseFloat(amount),
                    payment_method: state.paymentMethod
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.pay_url) {
                    tg.openLink(data.pay_url);
                } else {
                    tg.showAlert("Ошибка пополнения");
                }
            });
        };

        // Оплата заказа
        document.getElementById('btn-pay').onclick = async () => {
            const desc = document.getElementById('service-desc').value.trim();
            if (!desc) return tg.showAlert("Заполните ТЗ!");

            tg.showConfirm(`Списать ${state.selectedService.price}₽ за ${state.selectedService.name}?`, async (ok) => {
                if (!ok) return;
                const btn = document.getElementById('btn-pay');
                btn.disabled = true;
                setStatus('⏳ Обработка...', 'var(--neon-cyan)');
                try {
                    const res = await fetch(`${API_BASE}/api/create_order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: state.user.id,
                            user_name: state.user.first_name,
                            service_name: state.selectedService.name,
                            description: desc,
                            price: state.selectedService.price,
                            payment_method: state.paymentMethod
                        })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        setStatus('✅ Заказ принят!', '#4ade80');
                        tg.HapticFeedback.notificationOccurred('success');
                        tg.showAlert("✅ Заказ успешно создан!");
                        document.getElementById('service-desc').value = "";
                        updateProfileData();
                    } else if (data.pay_url) {
                        tg.showPopup({
                            title: 'Недостаточно средств',
                            message: 'Пополнить баланс?',
                            buttons: [{ id: 'pay', type: 'default', text: 'Пополнить' }, { type: 'cancel' }]
                        }, (id) => { if (id === 'pay') tg.openLink(data.pay_url); });
                    }
                } catch(e) {
                    setStatus('❌ Ошибка сервера', '#f87171');
                } finally {
                    btn.disabled = false;
                }
            });
        };

        document.getElementById('refresh-balance').onclick = updateProfileData;
        updateProfileData();
    </script>
</body>
</html>
